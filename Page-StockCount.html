<!-- Header แบบมีปุ่มย้อนกลับ -->
<div class="app-header sticky-top d-flex align-items-center">
  <button class="btn btn-link text-white p-0 me-3" onclick="goBackToMenu()">
    <i class="bi bi-chevron-left fs-2"></i>
  </button>
  <div>
    <h5 class="mb-0 fw-bold">นับสต็อก</h5>
    <small class="text-white-50" id="branch-name-display">กำลังโหลด...</small>
  </div>
</div>

<div class="container-fluid px-3 pb-5 mb-5"> <!-- เพิ่ม padding ล่างกันปุ่มบัง -->

  <!-- 1. รายการที่เพิ่งนับ (Recent Count) - ย้ายขึ้นมาบนสุด -->
  <div id="recent-count-container-wrapper" class="mb-3 shadow-sm border-0" style="display: none; border-radius: 15px; overflow: hidden;">
    <div class="bg-warning bg-opacity-10 px-3 py-2 text-warning fw-bold">
      <i class="bi bi-clock-history me-1"></i> ล่าสุด
    </div>
    <div id="recent-count-container" class="bg-white">
      <!-- รายการล่าสุดจะโผล่ที่นี่ -->
    </div>
  </div>

  <!-- 2. ช่องค้นหา (Search) - ย้ายลงมาตรงนี้ -->
  <div id="search-master-list" class="mb-3" style="display: none;">
    <div class="input-group shadow-sm" style="border-radius: 15px; overflow: hidden;">
      <span class="input-group-text bg-white border-0 ps-3">
        <i class="bi bi-search text-muted"></i>
      </span>
      <input 
        type="text" 
        id="search-input-field" 
        class="form-control border-0 py-3" 
        placeholder="ค้นหาชื่อ หรือ บาร์โค้ด..." 
        style="box-shadow: none;"
      >
    </div>
  </div>

  <!-- 3. รายการ Master List -->
  <div id="stock-list-spinner" class="text-center mt-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">กำลังโหลดรายการ...</p>
  </div>

  <ul id="stock-list-container" class="list-group shadow-sm" style="display: none; border-radius: 15px;">
    <!-- รายการสินค้าจะถูกเพิ่มที่นี่โดย JavaScript -->
  </ul>

</div>

<!-- 4. แถบเครื่องมือด้านล่าง (Bottom Action Bar) -->
<div class="bottom-action-bar fixed-bottom bg-white p-3 border-top shadow-lg" style="border-top-left-radius: 20px; border-top-right-radius: 20px;">
  
  <!-- ปุ่มเริ่มสแกน (ปกติ) -->
  <div id="start-scan-btn-container" class="d-grid">
    <button type="button" class="btn btn-primary btn-lg py-3 rounded-pill fw-bold shadow-sm" id="start-scan-btn" onclick="startScanner()">
      <i class="bi bi-upc-scan me-2"></i> เริ่มสแกน
    </button>
  </div>

  <!-- การ์ดบันทึกผล (ซ่อนไว้ก่อน จะโผล่เมื่อสแกนเจอ) -->
  <div id="scan-result-card" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-2">
       <div>
         <h6 class="mb-0 fw-bold text-primary" id="result-name">ชื่อสินค้า...</h6>
         <small class="text-muted" id="result-barcode">000000000</small>
       </div>
       <button class="btn btn-close bg-light" onclick="resetScanPage()"></button>
    </div>
    
    <div class="input-group mb-2">
      <input type="number" id="quantity-input" class="form-control form-control-lg text-center fw-bold bg-light border-0" placeholder="0" inputmode="numeric" style="border-radius: 10px;">
    </div>
    
    <div class="d-grid">
      <button class="btn btn-success btn-lg py-2 rounded-pill fw-bold" id="save-count-btn">
        <i class="bi bi-check-lg me-1"></i> บันทึก
      </button>
    </div>
  </div>

  <!-- แจ้งเตือน: ไม่พบสินค้า -->
  <div id="item-not-found-alert" class="alert alert-danger mb-0 text-center rounded-3 mt-2" style="display: none;">
    <strong>ไม่พบสินค้านี้</strong> ในรายการของสาขาคุณ
  </div>

  <!-- Toast แจ้งเตือนสถานะ -->
  <div id="save-status-toast" class="save-status-toast"></div>

</div>
