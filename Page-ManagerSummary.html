<div class="container-fluid pt-3">
  
  <!-- 1. Header -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <button
      class="btn btn-sm btn-outline-secondary"
      onclick="showPage('page-menu')"
    >
      <i class="bi bi-chevron-left"></i> กลับเมนู
    </button>
    <h5 class="mb-0 text-danger">สรุปผล (ผู้จัดการ)</h5>
  </div>

  <!-- 2. ตัวเลือกสาขา และปุ่มโหลด/ส่ง -->
  <div class="mb-3">
    <label for="manager-branch-selector" class="form-label"
      >เลือกสาขาเพื่อดูรายงาน:</label
    >
    <div class="input-group">
      <select
        class="form-select"
        id="manager-branch-selector"
        disabled
      >
        <option selected>กำลังโหลด...</option>
      </select>
      <button
        class="btn btn-primary"
        type="button"
        id="manager-load-report-btn"
        onclick="handleManagerReportLoad()"
        disabled
      >
        <i class="bi bi-arrow-clockwise"></i> โหลด
      </button>
      
      <!-- !! ปุ่มใหม่ !! -->
      <button
        class="btn btn-success"
        type="button"
        id="manager-send-email-btn"
        disabled
      >
        <i class="bi bi-envelope"></i> ส่งอีเมล
      </button>
      <!-- !! ---------------- !! -->
      
    </div>
  </div>

  <!-- 3. ปุ่มฟิลเตอร์ -->
  <div
    class="btn-group d-flex mb-2"
    role="group"
    aria-label="Filter buttons"
  >
    <!-- Filter All -->
    <input
      type="radio"
      class="btn-check"
      name="manager-filter-options"
      id="manager-filter-all"
      autocomplete="off"
      checked
      onchange="filterManagerSummaryReport('all')"
    />
    <label
      class="btn btn-outline-secondary"
      id="manager-filter-all-label"
      for="manager-filter-all"
      >ทั้งหมด (0)</label
    >

    <!-- Filter Short (ขาด) -->
    <input
      type="radio"
      class="btn-check"
      name="manager-filter-options"
      id="manager-filter-short"
      autocomplete="off"
      onchange="filterManagerSummaryReport('short')"
    />
    <label
      class="btn btn-outline-danger"
      id="manager-filter-short-label"
      for="manager-filter-short"
      >ขาด (0)</label
    >

    <!-- Filter Over (เกิน) -->
    <input
      type="radio"
      class="btn-check"
      name="manager-filter-options"
      id="manager-filter-over"
      autocomplete="off"
      onchange="filterManagerSummaryReport('over')"
    />
    <label
      class="btn btn-outline-warning text-dark"
      id="manager-filter-over-label"
      for="manager-filter-over"
      >เกิน (0)</label
    >

    <!-- Filter OK (ตรง) -->
    <input
      type="radio"
      class="btn-check"
      name="manager-filter-options"
      id="manager-filter-ok"
      autocomplete="off"
      onchange="filterManagerSummaryReport('ok')"
    />
    <label
      class="btn btn-outline-success"
      id="manager-filter-ok-label"
      for="manager-filter-ok"
      >ตรง (0)</label
    >
  </div>

  <!-- 4. Spinner (ตอนโหลด) -->
  <div id="manager-summary-report-spinner" class="text-center mt-3" style="display: none;">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p>กำลังประมวลผลรายงาน...</p>
  </div>
  
  <!-- 5. Toast (สำหรับส่งอีเมล) -->
  <div id="manager-email-toast" style="display: none;"></div>

  <!-- 6. รายการสรุปผล -->
  <div id="manager-report-list" class="pb-3">
    <!-- JavaScript จะวาดรายงานที่นี่ -->
  </div>
</div>
