<!--
  หน้านี้สำหรับ "Staff"
  นี่คือเวอร์ชันที่ถูกต้อง ซึ่งมี id="summary-report-spinner"
  และ id="summary-report-list" แยกกัน
-->
<div class="container p-3 pb-5">
    <!-- 1. Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-sm btn-outline-secondary" onclick="showPage('page-menu')">
            &lt; กลับเมนู
        </button>
        <h2 class="mb-0 text-success">สรุปผล (สาขา)</h2>
        <div style="width: 60px"></div>
        <!-- Spacer -->
    </div>

    <!-- 2. Filter Buttons -->
    <div class="btn-group w-100 mb-3" role="group">
        <input type="radio" class="btn-check" name="filter-options" id="filter-all" autocomplete="off" checked
            onclick="filterSummaryReport('all')" />
        <label class="btn btn-outline-secondary" for="filter-all" id="filter-all-label">ทั้งหมด (0)</label>

        <input type="radio" class="btn-check" name="filter-options" id="filter-short" autocomplete="off"
            onclick="filterSummaryReport('short')" />
        <label class="btn btn-outline-danger" for="filter-short" id="filter-short-label">ขาด (0)</label>

        <input type="radio" class="btn-check" name="filter-options" id="filter-over" autocomplete="off"
            onclick="filterSummaryReport('over')" />
        <label class="btn btn-outline-warning" for="filter-over" id="filter-over-label">เกิน (0)</label>

        <input type="radio" class="btn-check" name="filter-options" id="filter-ok" autocomplete="off"
            onclick="filterSummaryReport('ok')" />
        <label class="btn btn-outline-success" for="filter-ok" id="filter-ok-label">ตรง (0)</label>
    </div>

    <!-- 3. Report List Container (แยกส่วนออกมา) -->
    <div id="summary-report-spinner" class="text-center" style="display: none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p>กำลังประมวลผลรายงาน...</p>
    </div>

    <div id="summary-report-list">
        <!-- ผลลัพธ์จะถูกวาดลงในนี้ -->
    </div>
</div>
