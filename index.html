<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Kpshop - นับสต็อก</title>
    
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" 
      rel="stylesheet" 
    />
    
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    
  </head>
  <body> <!-- !! ลบ class="bg-light" ออก เพราะเราใช้สีเทาใหม่ใน CSS แล้ว -->
    
    <!-- โหลดเดอร์หลักของเพจ (แสดงระหว่างดึงไฟล์ HTML ย่อย) -->
    <div id="main-loader" class="vw-100 vh-100 d-flex justify-content-center align-items-center" style="background: #0f172a; position: fixed; top: 0; left: 0; z-index: 9999;">
        <div class="text-center text-white">
            <div class="spinner-border mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
            <h5>กำลังโหลดแอปพลิเคชัน...</h5>
        </div>
    </div>

    <div id="app-content" style="display: none;">
      <!-- หน้า Login -->
      <div id="page-login" class="page-container"></div>
  
      <!-- หน้า Menu -->
      <div id="page-menu" class="page-container" style="display: none"></div>
  
      <!-- หน้า Stock Count -->
      <div id="page-stock-count" class="page-container" style="display: none"></div>
  
      <!-- หน้า Summary -->
      <div id="page-summary" class="page-container" style="display: none"></div>
  
      <!-- หน้า Manager Summary -->
      <div id="page-manager-summary" class="page-container" style="display: none"></div>
      
      
      <!-- หน้าต่างกล้องแบบครึ่งจอ (Split Screen) -->
      <div 
        id="scanner-ui-overlay" 
        class="vw-100 vh-100" 
        style="
          display: none; 
          position: fixed; 
          top: 0; 
          left: 0; 
          z-index: 1050;
          background-color: #000;
        "
      >
        <!-- (1) ส่วนแสดงผลกล้อง: เอาแค่ครึ่งบน (ความสูง 50vh) -->
        <div style="position: relative; width: 100%; height: 50vh; overflow: hidden;">
          <!-- กล้อง -->
          <div id="scanner-container" class="w-100 h-100"></div>
          
          <!-- เลเซอร์ -->
          <div class="scanner-laser"></div>
          
          <!-- ปุ่มสลับกล้อง -->
          <button 
            id="switch-camera-btn" 
            class="btn btn-sm rounded-pill shadow" 
            style="position: absolute; top: 15px; right: 15px; z-index: 30; display: none; font-size: 0.8rem;"
            onclick="switchCamera()"
          >
            <i class="bi bi-arrow-repeat"></i> สลับกล้อง
          </button>
  
          <!-- ข้อความแนะนำ -->
          <div style="position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255,255,255,0.8); font-size: 0.8rem; z-index: 20;">
            วางบาร์โค้ดให้ตรงเส้นแดง
          </div>
        </div>
        
        <!-- (2) ส่วนควบคุมด้านล่าง -->
        <div class="d-flex flex-column justify-content-center align-items-center text-white" style="height: 50vh; background-color: #0f172a;"> <!-- เปลี่ยนสีพื้นหลังให้เข้ากับธีม -->
            
            <div class="mb-4 text-center text-white-50">
              <i class="bi bi-camera-video fs-1"></i>
              <p class="mt-2 mb-0">กำลังสแกน...</p>
            </div>
  
            <!-- ปุ่มปิดกล้อง -->
            <button 
              type="button" 
              class="btn btn-danger btn-lg rounded-pill px-5 py-3 shadow" 
              onclick="stopScanner()"
            >
              <i class="bi bi-x-lg me-2"></i> ปิดกล้อง
            </button>
        </div>
      </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    
  </body>
</html>
